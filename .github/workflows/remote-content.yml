name: Remote content

on:
  schedule:
    - cron: '17 3 * * 1'
  workflow_dispatch:
  pull_request:
    paths:
      - 'manifest.json'
      - 'daily.json'
      - 'daily_pool.json'
      - 'cards_patch.json'
      - 'blacklist.txt'
      - 'blacklist.json'
      - 'scripts/**'
      - '.github/workflows/remote-content.yml'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: node --check scripts/remote_content_rules.js
      - run: node --check scripts/validate_remote_content.js
      - run: node --check scripts/generate_daily.js
      - run: node scripts/validate_remote_content.js

  generate-weekly:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: node scripts/generate_daily.js
      - run: node scripts/validate_remote_content.js
      - name: Commit weekly content
        run: |
          if git diff --quiet -- daily.json; then
            echo "daily.json already current for this week"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add daily.json
            git commit -m "Update weekly remote content"
            git push
          fi
